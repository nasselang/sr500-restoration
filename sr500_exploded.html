<title>🏍️ SR500 — Interaktiv Deleoversikt</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{
  background:#0d1117;color:#e6edf3;
  font-family:'Segoe UI',system-ui,-apple-system,sans-serif;
  min-height:100vh;overflow-x:hidden
}
.header{
  text-align:center;padding:20px 20px 10px;
  border-bottom:1px solid #21262d;
}
.header h1{font-size:1.4em;color:#d29922}
.header p{color:#8b949e;font-size:.85em;margin-top:4px}
.main{display:flex;flex-direction:column;gap:0;max-width:1200px;margin:0 auto}

/* SVG area */
.svg-wrap{
  background:#161b22;padding:10px;border-bottom:1px solid #21262d;
  position:relative;overflow:hidden
}
.svg-wrap svg{width:100%;height:auto;display:block}

/* Legend */
.legend{
  display:flex;gap:12px;flex-wrap:wrap;justify-content:center;
  padding:8px;font-size:.75em;color:#8b949e;
  border-bottom:1px solid #21262d;background:#0d1117
}
.legend span{display:flex;align-items:center;gap:5px}
.dot{width:10px;height:10px;border-radius:50%;display:inline-block}

/* Panel */
.panel{
  background:#161b22;padding:16px;min-height:200px;
  transition:all .3s ease
}
.panel-placeholder{
  text-align:center;padding:40px 20px;color:#484f58
}
.panel-placeholder h3{font-size:1.1em;margin-bottom:8px}
.panel-placeholder p{font-size:.85em}
.panel-header{
  display:flex;justify-content:space-between;align-items:center;
  margin-bottom:12px;padding-bottom:8px;
  border-bottom:1px solid #21262d
}
.panel-header h2{font-size:1.1em;color:#d29922}
.panel-header .status{font-size:.75em;padding:2px 8px;border-radius:3px}
.status-todo{background:#9e6a03;color:#fff}
.status-wip{background:#1f6feb;color:#fff}
.status-done{background:#238636;color:#fff}
.panel-body{font-size:.85em;line-height:1.6}
.panel-body table{width:100%;border-collapse:collapse;margin-top:8px}
.panel-body th,.panel-body td{
  text-align:left;padding:4px 8px;border-bottom:1px solid #21262d
}
.panel-body th{color:#8b949e;font-weight:600;font-size:.8em}
.panel-body td{font-size:.82em}
.panel-body .sup{color:#58a6ff;text-decoration:none}
.panel-body .sup:hover{text-decoration:underline}
.panel-body .img-note{color:#d29922;font-style:italic;margin-top:8px}
.panel-body .subtitle{color:#8b949e;font-size:.85em;margin-bottom:6px}

/* Part tooltips on SVG */
.part-label{font-size:9px;fill:#8b949e;font-family:sans-serif}
.part-title{font-size:10px;font-weight:bold;fill:#e6edf3;font-family:sans-serif}

/* SVG hover/active effects */
.clickable{cursor:pointer;transition:opacity .2s}
.clickable:hover{opacity:1!important;filter:drop-shadow(0 0 6px rgba(88,166,255,.5))}
.clickable.active{filter:drop-shadow(0 0 10px rgba(210,153,34,.7))}
</style>
</head>

// Fix key mapping: SVG data-part attributes vs JS keys
const keyMap = {
  "frontfender-rearfender": "frontfender_rearfender",
  "handlebarcable": "handlebarcable",
  "frontfender-rearfender": "frontfender_rearfender"
};

document.querySelectorAll('.clickable').forEach(el => {
  el.addEventListener('click', function() {
    // Deselect all
    document.querySelectorAll('.clickable.active').forEach(a => a.classList.remove('active'));
    this.classList.add('active');
    
    const rawKey = this.getAttribute('data-part');
    const key = keyMap[rawKey] || rawKey;
    const data = partData[key];
    
    if (!data) {
      document.getElementById('placeholder').style.display = 'block';
      document.getElementById('details').style.display = 'none';
      return;
    }
    
    document.getElementById('placeholder').style.display = 'none';
    document.getElementById('details').style.display = 'block';
    
    document.getElementById('partTitle').textContent = data.name;
    document.getElementById('partStatus').textContent = data.statusLabel;
    document.getElementById('partStatus').className = 'status status-' + data.status;
    
    let html = `<div class="subtitle">${data.subtitle}</div>`;
    
    if (data.note) {
      html += `<div style="background:#1c2333;border:1px solid #d2992233;border-radius:6px;padding:8px;margin-bottom:8px;color:#d29922">📌 ${data.note}</div>`;
    }
    
    if (data.parts && data.parts.length > 0) {
      html += '<table><tr><th>#</th><th>Delenummer</th><th>Beskrivelse</th><th>Pris</th></tr>';
      data.parts.forEach(p => {
        html += `<tr><td>${p.no}</td><td style="font-family:monospace;color:#58a6ff">${p.pn}</td><td>${p.desc}</td><td>${p.price}</td></tr>`;
      });
      html += '</table>';
    }
    
    if (data.suppliers && data.suppliers.length > 0) {
      const supLinks = {
        "CMSNL": "https://www.cmsnl.com/yamaha-sr500_model16794/",
        "Megazip": "https://www.megazip.net/zapchasti-dlya-motocyklov/yamaha/sr500-14186",
        "Yambits": "https://yambits.co.uk/parts_for_yamaha_sr500.html",
        "KEDO": "https://www.kedo.de/sr500",
        "Ravns Garage": "https://www.ravnsgarage.no/yamaha-delekatalog",
        "AGM": "https://www.agm.no/mc/deler-til-motorsykkel",
        "Højstyling": "https://www.hojstyling.no/",
        "MotoLanna": "https://www.motolanna.com/ourshop/cat_180462-Yamaha.html",
        "motogadget": "https://www.motogadget.com/en-en/",
        "Vape Ignition": "https://www.tola-tools.de/en/vape-ignition-yamaha-sr500-tt500-xt500.html",
        "The Vintage Spoke": "https://www.thevintagespoke.com/shop/SR500/"
      };
      html += `<div style="margin-top:10px"><strong>Leverandører:</strong> `;
      html += data.suppliers.map(s => {
        const url = supLinks[s];
        if (url) return `<a href="${url}" target="_blank" class="sup">${s}</a>`;
        return s;
      }).join(' · ');
      html += '</div>';
    }
    
    if (data.img) {
      html += `<div class="img-note">📸 Bilde tilgjengelig i data-mappen</div>`;
    }
    
    document.getElementById('partBody').innerHTML = html;
    
    // Scroll to panel on mobile
    if (window.innerWidth < 768) {
      document.getElementById('panel').scrollIntoView({behavior:'smooth'});
    }
  });
});
</script>
